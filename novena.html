// Si hay una sesión real guardada (login.html la dejó en localStorage),
// usamos esos datos reales en vez del estado de demostración.
function cargarSesionReal() {
  const token = localStorage.getItem('sd_session');
  if (!token) return false;

  ESTADO_DEMO.esComprador = true;
  ESTADO_DEMO.diaDesbloqueado = parseInt(localStorage.getItem('sd_dia_desbloqueado') || '1', 10);
  try {
    ESTADO_DEMO.diasCompletados = JSON.parse(localStorage.getItem('sd_dias_completados') || '[]');
  } catch (e) {
    ESTADO_DEMO.diasCompletados = [];
  }
  return true;
}

const URL_BASE_AUDIO = 'https://pub-17b6dd695eac400e81cbb5a5047191fe.r2.dev';

let diaSeleccionado = 1;
let audioReproduciendo = false;
let progresoSimulado = 0;
let intervaloAudio = null;

function renderizarRosario() {
  const contenedor = document.getElementById('rosarioDias');
  contenedor.innerHTML = '';

  for (let i = 1; i <= ESTADO_DEMO.totalDias; i++) {
    const cuenta = document.createElement('div');
    let clase = 'cuenta-dia';
    let contenido = i;

    if (ESTADO_DEMO.diasCompletados.includes(i)) {
      clase += ' completado';
      contenido = ICONO_CHECK;
    } else if (i <= ESTADO_DEMO.diaDesbloqueado) {
      clase += ' disponible';
    } else {
      clase += ' bloqueado';
    }

    cuenta.className = clase;
    cuenta.innerHTML = contenido;
    cuenta.onclick = () => seleccionarDia(i);
    contenedor.appendChild(cuenta);
  }

  const texto = document.getElementById('textoProgreso');
  if (ESTADO_DEMO.diaDesbloqueado >= ESTADO_DEMO.totalDias) {
    texto.textContent = 'Has completado el camino de los 9 días.';
  } else {
    texto.textContent = `Estás en el día ${ESTADO_DEMO.diaDesbloqueado} de ${ESTADO_DEMO.totalDias}.`;
  }
}

function generarOnda() {
  let barras = '';
  for (let i = 0; i < 28; i++) {
    const alto = 6 + Math.round(Math.sin(i * 0.7) * 5 + 6);
    barras += `<span style="height:${alto}px" data-idx="${i}"></span>`;
  }
  return barras;
}

function seleccionarDia(dia) {
  detenerAudio();
  diaSeleccionado = dia;
  renderizarContenidoDia(dia);
}

function renderizarContenidoDia(dia) {
  const contenedor = document.getElementById('contenidoDia');
  const titulo = TITULOS_DIAS[dia];
  const disponible = dia <= ESTADO_DEMO.diaDesbloqueado;
  const tieneContenido = dia <= ESTADO_DEMO.diasConContenido;

  if (!disponible) {
    contenedor.innerHTML = `
      <div class="tarjeta-dia">
        <div class="aviso-bloqueo">
          <div class="icono-candado">${ICONO_CANDADO}</div>
          <div class="mensaje-bloqueo">Este día se desbloquea el día ${dia} de tu novena.<br>Vuelve entonces para continuar tu camino.</div>
        </div>
      </div>`;
    return;
  }

  if (!tieneContenido) {
    contenedor.innerHTML = `
      <div class="tarjeta-dia">
        <div class="aviso-bloqueo">
          <div class="icono-candado">${ICONO_PALOMA}</div>
          <div class="mensaje-bloqueo">El contenido de este día está en preparación.<br>Muy pronto disponible. Te avisaremos en cuanto esté listo.</div>
        </div>
      </div>`;
    return;
  }

  const duracion = DURACIONES_DIAS[dia] || "3:00";

  if (!ESTADO_DEMO.esComprador) {
    if (dia === 1) {
      contenedor.innerHTML = `
        <div class="tarjeta-dia">
          <div class="numero-dia">Día ${dia} de ${ESTADO_DEMO.totalDias}</div>
          <div class="titulo-dia">${titulo}</div>

          <div class="reproductor bloqueado">
            <div class="fila-reproductor">
              <button class="boton-play" onclick="irAComprar()">${ICONO_CANDADO}</button>
              <div class="info-reproductor">
                <div class="titulo-audio">${ICONO_NOTA} Audio narrado · ${duracion}</div>
                <div class="estado-audio">Disponible al desbloquear la novena</div>
              </div>
            </div>
          </div>

          <div class="texto-dia">${TEXTO_DIA_1_PREVIEW}</div>

          <div class="aviso-bloqueo" style="border-top:1px solid var(--borde);margin-top:6px;">
            <div class="precio-destacado">$4.99 USD</div>
            <div class="mensaje-bloqueo">Continúa tu novena completa de 9 días,<br>con audio narrado para cada día.</div>
            <button class="boton-comprar" onclick="irAComprar()">Comenzar mi novena completa</button>
            <div class="nota-garantia">${ICONO_ESCUDO} Pago único · acceso de por vida</div>
          </div>
        </div>`;
    } else {
      contenedor.innerHTML = `
        <div class="tarjeta-dia">
          <div class="numero-dia">Día ${dia} de ${ESTADO_DEMO.totalDias}</div>
          <div class="titulo-dia">${titulo}</div>
          <div class="aviso-bloqueo">
            <div class="icono-candado">${ICONO_CANDADO}</div>
            <div class="precio-destacado">$4.99 USD</div>
            <div class="mensaje-bloqueo">Desbloquea esta novena completa de 9 días<br>con audio narrado para acompañarte cada día.</div>
            <button class="boton-comprar" onclick="irAComprar()">Comenzar mi novena completa</button>
            <div class="nota-garantia">${ICONO_ESCUDO} Pago único · acceso de por vida</div>
          </div>
        </div>`;
    }
    return;
  }

  contenedor.innerHTML = `
    <div class="tarjeta-dia">
      <div class="numero-dia">Día ${dia} de ${ESTADO_DEMO.totalDias}</div>
      <div class="titulo-dia">${titulo}</div>

      <div class="reproductor">
        <div class="fila-reproductor">
          <button class="boton-play" id="botonPlay" onclick="alternarAudio(${dia})">${ICONO_PLAY}</button>
          <div class="info-reproductor">
            <div class="titulo-audio">${ICONO_NOTA} Audio narrado</div>
            <div class="estado-audio" id="estadoAudio">Toca para escuchar · ${duracion}</div>
          </div>
        </div>
        <div class="onda-audio" id="ondaAudio">${generarOnda()}</div>
        <div class="barra-progreso-audio" id="barraProgreso" onclick="buscarEnAudio(event)">
          <div class="relleno-progreso" id="rellenoProgreso"></div>
          <div class="perilla-progreso" id="perillaProgreso"></div>
        </div>
        <div class="fila-tiempos">
          <span id="tiempoActual">0:00</span>
          <span id="tiempoTotal">${duracion}</span>
        </div>

      <div class="fila-acciones">
        <button class="boton-accion" onclick="abrirLectura(${dia})">
          ${ICONO_LIBRO}
          <span>Leer</span>
        </button>
        <button class="boton-accion" id="botonGuardar" onclick="alternarGuardado(${dia})">
          <span id="iconoGuardar">${ESTADO_DEMO.diasGuardados && ESTADO_DEMO.diasGuardados.includes(dia) ? ICONO_GUARDAR_LLENO : ICONO_GUARDAR}</span>
          <span>Guardar</span>
        </button>
        <button class="boton-accion" onclick="compartirDia(${dia})">
          ${ICONO_COMPARTIR}
          <span>Compartir</span>
        </button>
      </div>

      <button class="boton-primario" style="margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;" onclick="marcarCompletado(${dia})">
        <span style="width:16px;height:16px;display:inline-flex;">${ICONO_CHECK}</span> Marcar día como completado
      </button>

  const botonGuardar = document.getElementById('botonGuardar');
  if (botonGuardar && ESTADO_DEMO.diasGuardados && ESTADO_DEMO.diasGuardados.includes(dia)) {
    botonGuardar.classList.add('activo');

  pintarOnda(0);

function abrirLectura(dia) {
  document.getElementById('lecturaNumeroDia').textContent = `Día ${dia} de ${ESTADO_DEMO.totalDias}`;
  document.getElementById('lecturaTitulo').textContent = TITULOS_DIAS[dia];
  document.getElementById('lecturaCuerpo').innerHTML = TEXTOS_DIAS[dia] || TEXTO_DIA_1_PREVIEW;
  document.getElementById('modalLectura').classList.add('visible');
  document.body.style.overflow = 'hidden';
}

function cerrarLectura() {
  document.getElementById('modalLectura').classList.remove('visible');
  document.body.style.overflow = '';
}

async function alternarGuardado(dia) {
  if (!ESTADO_DEMO.diasGuardados) ESTADO_DEMO.diasGuardados = [];
  const idx = ESTADO_DEMO.diasGuardados.indexOf(dia);
  const icono = document.getElementById('iconoGuardar');
  const boton = document.getElementById('botonGuardar');

  // Actualizamos la interfaz de inmediato, sin esperar la respuesta del servidor
  if (idx >= 0) {
    ESTADO_DEMO.diasGuardados.splice(idx, 1);
    icono.innerHTML = ICONO_GUARDAR;
    boton.classList.remove('activo');
  } else {
    ESTADO_DEMO.diasGuardados.push(dia);
    icono.innerHTML = ICONO_GUARDAR_LLENO;
    boton.classList.add('activo');
  }

  const token = localStorage.getItem('sd_session');
  if (!token) return;

  try {
    await fetch('/api/alternar-favorito', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionToken: token, dia })
    });
  } catch (e) {
    console.error('No se pudo guardar el favorito:', e);
  }
}

async function cargarFavoritosGuardados() {
  const token = localStorage.getItem('sd_session');
  if (!token) return;

  try {
    const respuesta = await fetch('/api/listar-favoritos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionToken: token })
    });
    const datos = await respuesta.json();
    ESTADO_DEMO.diasGuardados = (datos.favoritos || []).map(f => f.dia);
  } catch (e) {
    console.error('No se pudieron cargar los favoritos:', e);
  }
}

function compartirDia(dia) {
  const titulo = TITULOS_DIAS[dia];
  const textoPlano = (TEXTOS_DIAS[dia] || TEXTO_DIA_1_PREVIEW)
    .replace(/<[^>]+>/g, '\n')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
  const mensaje = `Novena a San Rafael Arcángel — Día ${dia}\n${titulo}\n\n${textoPlano}\n\nSanación Divina`;

  if (navigator.share) {
    navigator.share({ text: mensaje }).catch(() => {});
  } else {
    navigator.clipboard.writeText(mensaje).then(() => {
      alert('Oración copiada. Ya puedes compartirla por WhatsApp o donde prefieras.');
    });
  }
}

function irAComprar() {
  window.location.href = 'https://pay.hotmart.com/G106542088U';
}

function marcarCompletado(dia) {
  detenerAudio();
  if (!ESTADO_DEMO.diasCompletados.includes(dia)) {
    ESTADO_DEMO.diasCompletados.push(dia);
  }
  renderizarRosario();
  renderizarContenidoDia(dia);

  const token = localStorage.getItem('sd_session');
  if (token) {
    localStorage.setItem('sd_dias_completados', JSON.stringify(ESTADO_DEMO.diasCompletados));
    fetch('/api/marcar-completado', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionToken: token, dia })
    }).catch(() => {});
  }
}

let audioElement = null;

function obtenerAudioElement() {
  if (!audioElement) {
    audioElement = new Audio();
    audioElement.addEventListener('timeupdate', actualizarProgresoReal);
    audioElement.addEventListener('ended', detenerAudio);
    audioElement.addEventListener('loadedmetadata', () => {
      const total = document.getElementById('tiempoTotal');
      if (total) total.textContent = formatearTiempo(audioElement.duration);
    });
  }
  return audioElement;
}

function formatearTiempo(seg) {
  if (!isFinite(seg) || isNaN(seg)) return '0:00';
  const m = Math.floor(seg / 60);
  const s = Math.floor(seg % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function pintarOnda(fraccion) {
  const onda = document.getElementById('ondaAudio');
  if (!onda) return;
  const barras = onda.querySelectorAll('span');
  const activas = Math.floor(barras.length * fraccion);
  barras.forEach((b, i) => {
    b.style.opacity = i < activas ? '1' : '0.3';
  });
}

function actualizarProgresoReal() {
  const audio = obtenerAudioElement();
  if (!audio.duration) return;
  const fraccion = audio.currentTime / audio.duration;
  const relleno = document.getElementById('rellenoProgreso');
  const perilla = document.getElementById('perillaProgreso');
  const tiempoActual = document.getElementById('tiempoActual');
  if (relleno) relleno.style.width = (fraccion * 100) + '%';
  if (perilla) perilla.style.left = (fraccion * 100) + '%';
  if (tiempoActual) tiempoActual.textContent = formatearTiempo(audio.currentTime);
  pintarOnda(fraccion);
}

function alternarAudio(dia) {
  const audio = obtenerAudioElement();
  const boton = document.getElementById('botonPlay');
  const estado = document.getElementById('estadoAudio');

  if (audioReproduciendo) {
    audio.pause();
    audioReproduciendo = false;
    boton.innerHTML = ICONO_PLAY;
    estado.textContent = 'En pausa · ' + (DURACIONES_DIAS[dia] || formatearTiempo(audio.duration || 0));
    return;
  }

  const urlAudio = `${URL_BASE_AUDIO}/dia${dia}.mp3`;

  if (audio.src !== urlAudio) {
    audio.src = urlAudio;
  }

  audio.play().then(() => {
    audioReproduciendo = true;
    boton.innerHTML = ICONO_PAUSE;
    estado.textContent = 'Reproduciendo';
  }).catch((error) => {
    console.error('Error al reproducir audio:', error);
    estado.textContent = 'No se pudo cargar el audio. Intenta de nuevo.';
  });
}

function detenerAudio() {
  const audio = obtenerAudioElement();
  audio.pause();
  audio.currentTime = 0;
  audioReproduciendo = false;
  const boton = document.getElementById('botonPlay');
  if (boton) boton.innerHTML = ICONO_PLAY;
  const estado = document.getElementById('estadoAudio');
  if (estado) estado.textContent = 'Toca para escuchar · ' + (DURACIONES_DIAS[diaSeleccionado] || "");
  const relleno = document.getElementById('rellenoProgreso');
  if (relleno) relleno.style.width = '0%';
  const perilla = document.getElementById('perillaProgreso');
  if (perilla) perilla.style.left = '0%';
  const tiempo = document.getElementById('tiempoActual');
  if (tiempo) tiempo.textContent = '0:00';
  pintarOnda(0);
}

function buscarEnAudio(evento) {
  const audio = obtenerAudioElement();
  if (!audio.duration) return;
  const barra = document.getElementById('barraProgreso');
  const rect = barra.getBoundingClientRect();
  const fraccion = Math.min(Math.max((evento.clientX - rect.left) / rect.width, 0), 1);
  audio.currentTime = fraccion * audio.duration;
  actualizarProgresoReal();
}
