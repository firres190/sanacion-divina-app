    </a>

      <div class="marca" style="font-size:18px;">Tu bono de regalo</div>

  <div style="padding:20px 20px 0;text-align:center;">
    <div style="font-size:11.5px;font-weight:700;color:var(--dorado);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Regalo por tu compra</div>

  <div class="visor-libro" id="visorLibro">
    <div class="pagina-libro actual" id="paginaActual">
      <img id="imagenActual" src="" alt="Página del libro">
    </div>
    <div class="pagina-libro detras" id="paginaSiguiente" style="display:none;">
      <img id="imagenSiguiente" src="" alt="Página siguiente">
    </div>
    <div id="avisoBloqueoLibro" style="display:none;position:absolute;inset:0;z-index:10;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:24px;">
      <div style="background:rgba(250,246,240,0.94);border-radius:14px;padding:22px 18px;max-width:260px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--dorado);margin-bottom:10px;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <div style="font-family:var(--font-titulo);font-size:17px;font-weight:700;color:var(--vino);margin-bottom:8px;">Continúa leyendo</div>
        <div style="font-size:13px;color:var(--texto-suave);margin-bottom:16px;line-height:1.5;">Desbloquea el libro completo al comenzar tu novena a San Rafael Arcángel.</div>
        <button class="boton-comprar" style="font-size:14px;padding:11px 20px;" onclick="window.location.href='novena.html'">Comenzar mi novena</button>
      </div>
    </div>
  </div>

  <div class="controles-visor" style="max-width:340px;margin:18px auto 0;">
    <button class="boton-pagina" id="botonAnterior" onclick="paginaAnterior()" aria-label="Página anterior">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <span class="indicador-pagina" id="indicadorPagina">Página 1 de 21</span>
    <button class="boton-pagina" id="botonSiguiente" onclick="paginaSiguiente()" aria-label="Página siguiente">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <div style="padding:24px 20px 0;">
    <button class="boton-comprar" style="width:100%;" id="botonDescargarPdf" onclick="manejarDescarga()">
      Descargar PDF completo
    </button>
    <div class="nota-garantia" style="margin-top:14px;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--dorado)"><rect x="3" y="8" width="18" height="13" rx="1"/><path d="M3 8h18M12 8v13M7.5 8a2.5 2.5 0 1 1 0-5C9 3 12 5 12 8c0-3 3-5 4.5-5a2.5 2.5 0 1 1 0 5"/></svg>
      21 páginas · tuyo para siempre
    </div>
  </div>

  <div class="nav-inferior">
    <button class="nav-item" onclick="window.location.href='index.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/></svg>
      <span>Novenas</span>
    </button>
    <button class="nav-item activo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="13" rx="1"/><path d="M3 8h18M12 8v13M7.5 8a2.5 2.5 0 1 1 0-5C9 3 12 5 12 8c0-3 3-5 4.5-5a2.5 2.5 0 1 1 0 5"/></svg>
      <span>Bono</span>
    </button>
    <button class="nav-item" onclick="window.location.href='favoritos.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <span>Favoritos</span>
    </button>
    <button class="nav-item" onclick="window.location.href='silencio.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <span>Silencio</span>
    </button>
    <button class="nav-item" onclick="window.location.href='diario.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>Diario</span>
    </button>
  </div>

</div>

<script>
const URL_BASE_LIBRO = 'https://pub-17b6dd695eac400e81cbb5a5047191fe.r2.dev';
const TOTAL_PAGINAS = 21;
const PAGINA_LIMITE_GRATIS = 4;
const URL_SONIDO_PAGINA = `${URL_BASE_LIBRO}/pagina-sonido.mp3`;

function esComprador() {
  return !!localStorage.getItem('sd_session');
}

let paginaActual = 1;
let animando = false;
const sonidoPagina = new Audio(URL_SONIDO_PAGINA);

function urlPagina(numero) {
  return `${URL_BASE_LIBRO}/libro-pagina-${numero}.jpg`;
}

function precargarPagina(numero) {
  if (numero < 1 || numero > TOTAL_PAGINAS) return;
  const img = new Image();
  img.src = urlPagina(numero);
}

function inicializarVisor() {
  document.getElementById('imagenActual').src = urlPagina(paginaActual);
  actualizarControles();
  precargarPagina(paginaActual + 1);
  precargarPagina(paginaActual - 1);
}

function actualizarControles() {
  document.getElementById('indicadorPagina').textContent = `Página ${paginaActual} de ${TOTAL_PAGINAS}`;
  document.getElementById('botonAnterior').disabled = paginaActual <= 1;
  document.getElementById('botonSiguiente').disabled = paginaActual >= TOTAL_PAGINAS;
  aplicarBloqueoSiCorresponde();
}

function aplicarBloqueoSiCorresponde() {
  const aviso = document.getElementById('avisoBloqueoLibro');
  const bloqueada = !esComprador() && paginaActual > PAGINA_LIMITE_GRATIS;
  const imagenActual = document.getElementById('imagenActual');

  imagenActual.style.filter = bloqueada ? 'blur(14px)' : 'none';
  aviso.style.display = bloqueada ? 'flex' : 'none';
}

function reproducirSonidoPagina() {
  try {
    sonidoPagina.currentTime = 0;
    sonidoPagina.play().catch(() => {});
  } catch (e) {}
}

function cargarImagen(url) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(url);
    img.onerror = () => resolve(url);
    img.src = url;
  });
}

async function cambiarPagina(numeroNuevo, direccion) {
  if (animando || numeroNuevo < 1 || numeroNuevo > TOTAL_PAGINAS) return;
  animando = true;

  const paginaActualEl = document.getElementById('paginaActual');
  const paginaSiguienteEl = document.getElementById('paginaSiguiente');
  const imagenSiguiente = document.getElementById('imagenSiguiente');

  const urlNueva = urlPagina(numeroNuevo);

  // Esperamos a que la imagen esté completamente decodificada en memoria
  // antes de mostrarla, para que nunca aparezca un parpadeo en blanco
  // mientras el navegador todavía está descargando o pintando el archivo.
  await cargarImagen(urlNueva);

  reproducirSonidoPagina();

  imagenSiguiente.src = urlNueva;
  paginaSiguienteEl.style.display = 'block';
  paginaSiguienteEl.classList.remove('detras');
  paginaSiguienteEl.style.zIndex = '2';
  paginaActualEl.style.zIndex = '5';
  paginaActualEl.style.transition = 'transform 0.6s cubic-bezier(0.45, 0.05, 0.55, 0.95)';

  requestAnimationFrame(() => {
    paginaActualEl.classList.add('girando-adelante');
  });

  setTimeout(() => {
    paginaActual = numeroNuevo;

    paginaActualEl.style.transition = 'none';
    document.getElementById('imagenActual').src = urlNueva;
    paginaActualEl.classList.remove('girando-adelante');
    paginaActualEl.style.zIndex = '3';
    paginaSiguienteEl.style.display = 'none';

    void paginaActualEl.offsetHeight;
    paginaActualEl.style.transition = '';

    actualizarControles();
    precargarPagina(paginaActual + (direccion === 'siguiente' ? 1 : -1));
    animando = false;
  }, 620);
}

function paginaSiguiente() {
  cambiarPagina(paginaActual + 1, 'siguiente');
}

function paginaAnterior() {
  cambiarPagina(paginaActual - 1, 'anterior');
}

let inicioToqueX = 0;
document.getElementById('visorLibro').addEventListener('touchstart', (e) => {
  inicioToqueX = e.touches[0].clientX;
});
document.getElementById('visorLibro').addEventListener('touchend', (e) => {
  const finToqueX = e.changedTouches[0].clientX;
  const diferencia = finToqueX - inicioToqueX;
  if (Math.abs(diferencia) > 40) {
    if (diferencia < 0) paginaSiguiente();
    else paginaAnterior();
  }
});

function manejarDescarga() {
  if (esComprador()) {
    window.open('https://pub-17b6dd695eac400e81cbb5a5047191fe.r2.dev/guia-conexion-oracion.pdf', '_blank');
  } else {
    window.location.href = 'novena.html';
  }
}

inicializarVisor();
</script>

<script src="js/perfil.js"></script>
<script>
document.getElementById('contenedorBotonPerfil').innerHTML = htmlBotonPerfil();
inyectarPerfilEnPagina();
</script>
</body>
</html>
